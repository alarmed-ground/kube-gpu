apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: vllm-serve-job
  namespace: vllm
spec:
  rayClusterSpec:
    rayVersion: "2.55.0"

    headGroupSpec:
      serviceType: ClusterIP
      rayStartParams:
        dashboard-host: "0.0.0.0"
        port: "6379"
        num-gpus: "1"
      template:
        metadata:
          labels:
            app: qwen-gh200
            ray.io/node-type: head
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8080"
            prometheus.io/path: "/metrics"
        spec:
          runtimeClassName: nvidia
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 1000
          nodeSelector:
            node-role: s7g
          volumes:
            - name: hf-cache
              persistentVolumeClaim:
                claimName: movigo-vllm
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 64Gi
            - name: serve-script
              configMap:
                name: vllm-serve-script
                defaultMode: 0755
          containers:
            - name: ray-head
              image: peratchikannan/hs-public:vllm-rayv0.20.2
              ports:
                - containerPort: 6379
                  name: gcs
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
                - containerPort: 8080
                  name: metrics
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: hf-secret
                      key: token
                - name: HF_HUB_ENABLE_HF_TRANSFER
                  value: "1"
                - name: NCCL_DEBUG
                  value: INFO
                - name: NCCL_IB_DISABLE
                  value: "0"
                - name: NCCL_SOCKET_IFNAME
                  value: nm-bond
                - name: NCCL_IB_HCA
                  value: mlx5
                - name: GLOO_SOCKET_IFNAME
                  value: nm-bond
                - name: TP_SOCKET_IFNAME
                  value: nm-bond
              volumeMounts:
                - name: hf-cache
                  mountPath: /root/.cache/huggingface
                - name: dshm
                  mountPath: /dev/shm
                - name: serve-script
                  mountPath: /serve
              resources:
                requests:
                  nvidia.com/gpu: 1
                  cpu: "32"
                  memory: 400Gi
                limits:
                  nvidia.com/gpu: 1
                  cpu: "64"
                  memory: 420Gi

    workerGroupSpecs:
      - groupName: gh200-workers
        replicas: 1
        rayStartParams:
          num-gpus: "1"
        template:
          metadata:
            labels:
              app: qwen-gh200
              ray.io/node-type: worker
            annotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "8080"
              prometheus.io/path: "/metrics"
          spec:
            runtimeClassName: nvidia
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              fsGroup: 1000
            nodeSelector:
              node-role: s7g
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchExpressions:
                        - key: ray.io/node-type
                          operator: In
                          values:
                            - worker
                    topologyKey: kubernetes.io/hostname
            volumes:
              - name: hf-cache
                persistentVolumeClaim:
                  claimName: movigo-vllm
              - name: dshm
                emptyDir:
                  medium: Memory
                  sizeLimit: 64Gi
            containers:
              - name: ray-worker
                image: peratchikannan/hs-public:vllm-rayv0.20.2
                ports:
                  - containerPort: 8080
                    name: metrics
                env:
                  - name: HF_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: hf-secret
                        key: token
                  - name: HF_HUB_ENABLE_HF_TRANSFER
                    value: "1"
                  - name: NCCL_DEBUG
                    value: INFO
                  - name: NCCL_IB_DISABLE
                    value: "0"
                  - name: NCCL_SOCKET_IFNAME
                    value: nm-bond
                  - name: NCCL_IB_HCA
                    value: mlx5
                  - name: GLOO_SOCKET_IFNAME
                    value: nm-bond
                  - name: TP_SOCKET_IFNAME
                    value: nm-bond
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: dshm
                    mountPath: /dev/shm
                resources:
                  requests:
                    nvidia.com/gpu: 1
                    cpu: "32"
                    memory: 400Gi
                  limits:
                    nvidia.com/gpu: 1
                    cpu: "64"
                    memory: 420Gi

  entrypoint: "python3 /serve/serve_app.py"

  runtimeEnvYAML: |
    env_vars:
      HF_TOKEN: ""
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      NCCL_DEBUG: "INFO"
      NCCL_IB_DISABLE: "0"
      NCCL_SOCKET_IFNAME: "nm-bond"
      NCCL_IB_HCA: "mlx5"
      GLOO_SOCKET_IFNAME: "nm-bond"
      TP_SOCKET_IFNAME: "nm-bond"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "0"
      VLLM_USE_SIMPLE_KV_OFFLOAD: "1"
    pip:
      - httpx

  shutdownAfterJobFinishes: false
  ttlSecondsAfterFinished: 0

  submitterPodTemplate:
    spec:
      nodeName: node2-quantagrid-s74g-2u-1s7g2000026
      restartPolicy: Never
      containers:
        - name: ray-job-submitter
          image: peratchikannan/hs-public:vllm-rayv0.20.2
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: token
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
