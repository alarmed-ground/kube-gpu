apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-serve-script
  namespace: vllm
data:
  serve_app.py: |
    #!/usr/bin/env python3
    import os, sys, ray, subprocess

    ray.init(address="auto", ignore_reinit_error=True, logging_level="WARNING")
    print("Ray cluster resources:", ray.cluster_resources())

    env = os.environ.copy()
    env.update({
        "PYTORCH_CUDA_ALLOC_CONF":                  "expandable_segments:True",
        "VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS": "0",
        "RAY_ADDRESS":                              "auto",
    })

    cmd = [
        sys.executable, "-m", "vllm.entrypoints.openai.api_server",
        "--model",                        "/root/.cache/huggingface/hub/models--Qwen--Qwen3.6-35B-A3B",
        "--host",                         "0.0.0.0",
        "--port",                         "8000",
        "--distributed-executor-backend", "ray",
        "--tensor-parallel-size",         "2",
        "--pipeline-parallel-size",       "1",
        "--gpu-memory-utilization",       "0.95",
        "--max-num-seqs",                 "32",
        "--max-model-len",                "1010000",
        "--kv-offloading-size",           "400",
        "--kv-offloading-backend",        "native",
        "--kv-transfer-config",           '{"kv_connector_extra_config": {"lazy_offload": false}}',
        "--no-disable-hybrid-kv-cache-manager",   # required for hybrid model
        "--enable-prefix-caching",
        "--enable-expert-parallel",
        "--mm-encoder-tp-mode",           "data",
        "--reasoning-parser",             "qwen3",
        "--enable-auto-tool-choice",
        "--tool-call-parser",             "qwen3_coder",
        "--attention-config",             '{"use_trtllm_attention": false}',
        "--hf-overrides",                 '{"text_config": {"rope_parameters": {"rope_type": "yarn", "rope_theta": 10000000, "partial_rotary_factor": 0.25, "factor": 4.0, "original_max_position_embeddings": 262144}}}',
        "--trust-remote-code",
        "--served-model-name",            "intrallmai/intrallm-q3.6",
        "--api-key",                      "99NPIiqNYBgaW9eCCB5KJRgpVHN0sOCD",
        "--no-disable-sliding-window",
        "--safetensors-load-strategy=prefetch",
        "--dtype",                        "bfloat16",
    ]

    print("Launching:", " ".join(cmd))
    proc = subprocess.run(cmd, env=env)
    sys.exit(proc.returncode)
